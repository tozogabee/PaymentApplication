spring:
  application:
    name: PaymentApplication
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payment}
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD:payment}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Mock payment gateway: how a PUT (which submits the payment to the gateway) resolves.
#   RANDOM (default) -> approve/decline at random, so both COMPLETED and FAILED appear on a plain run
#   ALWAYS_APPROVE   -> always COMPLETED (the containerised app / CI use this for deterministic E2E)
#   ALWAYS_DECLINE   -> always FAILED  (to demonstrate the FAILED path on demand)
payment:
  gateway:
    mode: ${PAYMENT_GATEWAY_MODE:RANDOM}

management:
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    com.example.payment: DEBUG