spring:
  application:
    name: PaymentApplication
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payment}
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD:payment}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    com.example.payment: DEBUG