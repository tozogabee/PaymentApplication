name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build, Run Bruno test collection, Docker image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      # Publish the image only for pushes to main and pull requests targeting main.
      PUBLISH_IMAGE: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main') }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and verify
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start application stack
        run: docker compose up -d --build --wait --wait-timeout 180

      - name: Run Bruno API tests
        working-directory: bruno
        run: npx --yes @usebruno/cli run -r --env Local --reporter-junit results.xml

      - name: Run concurrency check
        # Parallel-load check against the running stack. Scenario 1 (concurrent updates) is the
        # deterministic pass/fail gate: exactly one update wins, the rest get 409 (optimistic
        # locking). jq/curl are preinstalled on ubuntu-latest.
        run: bash scripts/concurrency-check.sh

      - name: Print application logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v

      # --- Docker image: built and pushed to GHCR only for main pushes / PRs into main, and only
      #     if every step above succeeded (a custom `if:` implies success()). ---
      - name: Set up Docker Buildx
        if: env.PUBLISH_IMAGE == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: env.PUBLISH_IMAGE == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags, labels)
        id: meta
        if: env.PUBLISH_IMAGE == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        if: env.PUBLISH_IMAGE == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max