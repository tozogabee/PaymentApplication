name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and verify
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start application stack
        run: docker compose up -d --build --wait --wait-timeout 180

      - name: Run Bruno API tests
        working-directory: bruno
        run: npx --yes @usebruno/cli run -r --env Local --reporter-junit results.xml

      - name: Print application logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v